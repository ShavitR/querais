version: 2
updates:
  # npm/pnpm: one batched PR of minor+patch updates a month. Majors are excluded — they
  # land as deliberate, reviewed bumps (e.g. zod 4, eslint 10, openai 6), not auto-PRs —
  # so a breaking change can't masquerade as a routine "dev-tooling" update.
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
    labels:
      - dependencies

  # GitHub Actions: one batched PR a month. Majors are kept here — action major bumps are
  # low-risk and carry the runtime-deprecation fixes (e.g. the Node-20 → Node-24 move).
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: monthly
    groups:
      github-actions:
        patterns: ['*']
    labels:
      - dependencies
      - ci
