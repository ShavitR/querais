version: 2
updates:
  # npm/pnpm dependencies across the monorepo (root + every workspace package).
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Batch low-risk dev tooling so we get one PR instead of a swarm.
      dev-tooling:
        patterns:
          - 'eslint*'
          - '@eslint/*'
          - 'typescript-eslint'
          - 'prettier'
          - 'tsx'
          - 'rimraf'
          - 'solhint'
    labels:
      - dependencies

  # Keep the GitHub Actions in this workflow pinned and current.
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    labels:
      - dependencies
      - ci
