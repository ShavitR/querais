name: CI

# Locks in the project's "green bar" (build · typecheck · lint · test · e2e) on every
# change, plus Solidity static analysis and a non-gating coverage report. Mirrors the
# commands a developer runs locally, so a green PR == a green local checkout.

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same branch/PR cancels the in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22' # pnpm 11.5.2 needs Node >=22.13 (uses node:sqlite); matches engines.node
  PNPM_VERSION: '11.5.2' # matches the local toolchain

jobs:
  green-bar:
    name: Build · typecheck · lint · test · e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      # The gateway/daemon read repo-root .env; localhost/hardhat use only the
      # well-known Hardhat dev accounts shipped in .env.example (no real secrets).
      - name: Seed .env from example
        run: cp .env.example .env
      - name: Install (frozen)
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint (eslint + prettier)
        run: pnpm lint
      - name: Unit tests
        run: pnpm test
      # Self-contained: spawns its own Hardhat node + deploys + runs the 6 acceptance
      # scenarios with the MockBackend. No Ollama / DB / Redis required.
      - name: E2E acceptance gate
        run: pnpm test:e2e

  python-sdk:
    name: Python SDK (ruff · pytest · build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: sdk-python
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: sdk-python/pyproject.toml
      - name: Install (editable + dev tools)
        run: pip install -e ".[dev]"
      - name: Ruff (lint + format)
        run: |
          ruff check .
          ruff format --check .
      # Integration tests (langchain/llamaindex) skip without the extras — kept light
      # here; the extras were exercised locally and pin only official upstream classes.
      - name: Pytest
        run: pytest -q
      - name: Build sdist + wheel
        run: python -m build

  gitleaks:
    name: Secret scan (gitleaks, gating)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # fetch-depth 0: the scan covers the FULL history, same as the local run
      # recorded in docs/REPO_PUBLIC_CHECKLIST.md. Any finding not allowlisted
      # in .gitleaks.toml (public constants only) fails the job — gating.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install gitleaks 8.24.3 (pinned — matches the recorded local scan)
        run: |
          curl -sSfL -o gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks version
      - name: Full-history scan
        run: ./gitleaks git --log-opts="--all" --config .gitleaks.toml --redact=70 .

  solidity:
    name: Solidity lint (solhint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install (frozen)
        run: pnpm install --frozen-lockfile
      # Blocking Solidity gate. solhint is pure-JS and parses .sol directly, so it is
      # independent of the Hardhat version. 0 errors today (warnings are non-fatal
      # style/gas hints). Deeper static analysis runs in the non-gating `slither` job.
      - name: solhint
        run: pnpm --filter @querais/contracts lint:sol

  slither:
    name: Slither (reported, non-gating)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Slither cannot drive Hardhat 3 (crytic-compile's hardhat platform expects the
    # HH2 build-info shape — KeyError: 'output'), and pointing solc at the real tree
    # trips --allow-paths on pnpm's symlinked store. Workaround: copy contracts plus a
    # dereferenced OpenZeppelin into a scratch dir and run slither there (no symlinks,
    # no Hardhat). Triage lives in packages/contracts/slither.config.json; rationale
    # per excluded detector in docs/SLITHER_TRIAGE.md. Baseline = exactly 1 acknowledged
    # finding (arbitrary-send-erc20 in JobEscrow.createJob — MATCHING_ENGINE-gated,
    # bounded by the requester's allowance; the documented trusted-gateway model).
    # The step exits non-zero only if NEW findings appear; continue-on-error keeps it
    # non-gating, so "failed (allowed)" == new finding to triage, green == baseline.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install slither + solc 0.8.28
        run: |
          pip install slither-analyzer==0.11.5 solc-select
          solc-select install 0.8.28
          solc-select use 0.8.28
      - name: Install (frozen — brings OpenZeppelin)
        run: pnpm install --frozen-lockfile
      - name: Build symlink-free scratch tree
        working-directory: packages/contracts
        run: |
          mkdir slither-scratch
          cp -r contracts slither-scratch/contracts
          cp -rL node_modules/@openzeppelin/contracts slither-scratch/oz-contracts
      - name: Slither (fails only on findings beyond the triaged baseline of 7)
        working-directory: packages/contracts/slither-scratch
        run: |
          slither contracts --solc-remaps "@openzeppelin/contracts/=oz-contracts/" \
            --config-file ../slither.config.json 2>&1 | tee slither.log || true
          COUNT=$(grep -oE '[0-9]+ result' slither.log | tail -1 | grep -oE '[0-9]+' || echo 0)
          echo "findings: ${COUNT:-0} (baseline 7 = acknowledged findings, see docs/SLITHER_TRIAGE.md)"
          test "${COUNT:-0}" -le 7

  coverage:
    name: Coverage (reported, non-gating)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Best-effort signal only. TS line coverage via node:test; contract-line coverage
    # is deferred until an HH3-compatible tool exists (Hardhat 3 has no built-in
    # coverage and solidity-coverage predates it).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Seed .env from example
        run: cp .env.example .env
      - name: Install (frozen)
        run: pnpm install --frozen-lockfile
      - name: Build (coverage reads built sibling packages)
        run: pnpm build
      - name: TS unit coverage
        run: pnpm test:coverage

  audit:
    name: Dependency audit (reported, non-gating)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install (frozen)
        run: pnpm install --frozen-lockfile
      # Reports high+ advisories without gating (one known dev-only transitive: undici
      # via Hardhat test tooling). `|| true` keeps the job green; findings stay in the log.
      - name: pnpm audit (high+)
        run: pnpm audit --audit-level=high || true
