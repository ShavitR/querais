name: Release

# Tag `vX.Y.Z` → full green bar → bundle the daemon → smoke the actual bundle →
# publish the SDKs → DRAFT GitHub Release with artifacts.
#
# SDK publishing AUTO-DETECTS the registry secrets: when NPM_TOKEN / PYPI_TOKEN are
# set as repo secrets the SDKs publish for real; until then each step runs a dry-run
# (npm) / build-only (PyPI) so a tag is always a safe rehearsal. The GitHub Release is
# always a DRAFT — it stays invisible until a human presses publish.
#
# One-time operator setup to switch on live publishing (no workflow edits needed):
#   1. npm:  create the @querais org → mint an Automation token → `gh secret set NPM_TOKEN`
#   2. PyPI: create the `querais` project / token → `gh secret set PYPI_TOKEN`
# After that, the FIRST real publish of a version is permanent — bump versions per release.

on:
  push:
    tags: ['v*']

permissions:
  contents: write # create the draft release + upload assets

env:
  NODE_VERSION: '22' # pnpm 11.5.2 needs Node >=22.13 (uses node:sqlite)
  PNPM_VERSION: '11.5.2'

jobs:
  release:
    name: Green bar → bundle → smoke → draft release
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      # Resolve to '' when the secret is absent — the publish steps branch on these.
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Seed .env from example
        run: cp .env.example .env
      - name: Install (frozen)
        run: pnpm install --frozen-lockfile

      # ── The same green bar CI enforces — a release is never softer than a PR ──
      - name: Build
        run: pnpm build
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Unit tests
        run: pnpm test
      - name: E2E acceptance gate (18 scenarios)
        run: pnpm test:e2e

      # ── Node daemon release artifact ──
      - name: Bundle the daemon (esbuild → single-file ESM + archive + SHA256SUMS)
        run: node scripts/bundle-daemon.mjs --version ${{ github.ref_name }}
      - name: Smoke the bundle (the artifact itself serves a job on a local chain)
        run: pnpm smoke:bundle

      # ── SDK packaging — real publish iff the registry secret is set, else rehearse ──
      # `pnpm publish -r` walks the workspace in TOPOLOGICAL order (contracts → shared
      # → sdk; @querais/matching is private and skipped) and rewrites each `workspace:*`
      # range to the real version — a plain `npm publish` would ship a broken range, and
      # publishing `shared` without `contracts` (which it depends on) breaks installs.
      - name: npm publish (@querais/contracts → shared → sdk)
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> ~/.npmrc
            pnpm publish -r --access public --no-git-checks
          else
            echo "NPM_TOKEN not set — dry-run only (set the secret to publish for real)"
            pnpm publish -r --access public --no-git-checks --dry-run
          fi
      - name: Build the Python SDK (sdist + wheel)
        working-directory: sdk-python
        run: |
          pip install build
          python -m build
      # PyPI permanently rejects re-uploading a version — bump sdk-python/pyproject.toml
      # before each real release. Trusted Publishing (OIDC) is an alternative to the
      # token: add `id-token: write` perms + pypa/gh-action-pypi-publish.
      - name: Publish the Python SDK to PyPI
        if: env.PYPI_TOKEN != ''
        working-directory: sdk-python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          pip install twine
          twine upload dist/*

      # ── Draft release: a human reviews and presses publish ──
      - name: Draft GitHub Release with all artifacts
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            release/*.tar.gz
            release/SHA256SUMS
            sdk-python/dist/*
