# QueraIS gateway — Fly.io deploy (Slice 7). ONE stateful instance, always.
#
# Deploy from the repo ROOT so the Docker build context is the whole monorepo:
#   fly deploy . --config packages/gateway/fly.toml \
#                --dockerfile packages/gateway/Dockerfile --strategy immediate
# First-time setup (app, volume, secrets) + drills: docs/DEPLOY.md.

app = "querais-gateway"  # change to your Fly app name
primary_region = "iad"   # pick a region near your RPC provider

[build]
  dockerfile = "packages/gateway/Dockerfile"

[env]
  GATEWAY_PORT = "8787"
  NETWORK = "arbitrumSepolia"
  # SQLite lives on the mounted volume so settled state + the pending-debit ledger
  # survive restarts/redeploys. THIS DB IS MONEY (unsettled liability owed to nodes).
  GATEWAY_DB_PATH = "/data/gateway.db"
  # Drain window for the pending-debit flush on SIGTERM. Must stay below kill_timeout.
  GATEWAY_SHUTDOWN_GRACE_MS = "25000"

# The single-writer SQLite volume. A Fly volume binds to exactly ONE machine — that is
# the physical guarantee behind the single-instance rule. Never `fly scale count` above 1.
[mounts]
  source = "querais_data"
  destination = "/data"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = false # never stop the stateful writer
  auto_start_machines = true
  min_machines_running = 1

  # Liveness — a failure here restarts the machine.
  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

  # Readiness — gates routing; /ready returns 503 when the RPC or DB is unavailable,
  # so Fly stops sending jobs that would fail at the first chain call.
  [[http_service.checks]]
    grace_period = "20s"
    interval = "15s"
    method = "GET"
    path = "/ready"
    timeout = "5s"

[deploy]
  # In-place update on the single machine. "rolling"/"canary" would try to start a
  # SECOND machine, which can't attach the in-use volume — and two writers would
  # double-publish reputation / double-raise disputes. Always immediate.
  strategy = "immediate"

# Fly waits this long after SIGTERM for the drain (app.close flushes pending debits in
# one batchSettle) before SIGKILL. Keep it above GATEWAY_SHUTDOWN_GRACE_MS.
kill_timeout = "30s"
